<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Book an Appointment — Northwest Tranquil Minds PLLC</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
	<script defer src="js/nav.js"></script>
</head>
<body>
	<header class="site-header">
		<a href="index.html" class="logo-link"><img src="logo.jpg" alt="Northwest Tranquil Minds Logo" class="logo"></a>
		<button type="button" class="nav-toggle" aria-expanded="false" aria-controls="site-nav" aria-label="Open menu">
			<span class="nav-toggle-bar" aria-hidden="true"></span>
			<span class="nav-toggle-bar" aria-hidden="true"></span>
			<span class="nav-toggle-bar" aria-hidden="true"></span>
		</button>
		<nav id="site-nav" class="site-nav" aria-label="Main">
			<ul>
				<li><a href="index.html">Home</a></li>
				<li><a href="about.html">About</a></li>
				<li><a href="services.html">Services</a></li>
				<li><a href="book.html" class="nav-link--cta" aria-current="page">Book an Appointment</a></li>
			</ul>
		</nav>
	</header>

	<main>
		<section class="book">
			<header class="section-head section-head--narrow">
				<p class="section-eyebrow">Next step</p>
				<h2>Book an Appointment</h2>
			</header>
			<div class="booking-shell">
			<form class="booking-form">
				<label for="first">First Name</label>
				<input type="text" id="first" name="first" required>
				<label for="last">Last Name</label>
				<input type="text" id="last" name="last" required>
				<label for="phone">Phone</label>
				<input type="tel" id="phone" name="phone" required>
				<label for="email">Email</label>
				<input type="email" id="email" name="email" required>
				<label for="reason">Reason for Visit</label>
				<textarea id="reason" name="reason" rows="3" required></textarea>
				<button type="submit">Submit request</button>
			</form>
			</div>
		</section>
	</main>

	<footer>
		<p>&copy; 2026 Northwest Tranquil Minds PLLC. All rights reserved.</p>
	</footer>
</body>
</html>
